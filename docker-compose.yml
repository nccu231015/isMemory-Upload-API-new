version: '3.8'

services:
  upload-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: upload-api
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - PORT=8080
      - PYTHONUNBUFFERED=1
    volumes:
      - ./shorts_cache:/app/shorts_cache
      - ./tiktok_videos:/app/tiktok_videos
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-tunnel
    command: tunnel --no-autoupdate run --token eyJhIjoiNDU1Yzk1NThlNzZjMmRlMWI3ZDAwOTM3MGFiMDIzNDciLCJ0IjoiZWFlNGU1YTUtZDJiZi00MzA5LWJhM2ItZDRmN2ExMjQ0NmNmIiwicyI6Ik5UVmtOMk13TXpFdFlUQXlNeTAwWVdWbExUZzBZall0WlRBMk9UWTJOVEprWTJKaiJ9
    restart: unless-stopped
    depends_on:
      - upload-api

